<!DOCTYPE html>
<html>
<head>
    <title>PathFinder | Dijkstra Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f19; color: #f8fafc; font-family: 'Outfit', sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(15, 30px); gap: 2px; justify-content: center; margin-top: 20px; }
        .cell { width: 30px; height: 30px; background: #1f2937; border: 1px solid #111827; cursor: pointer; }
        .cell.start { background: #3b82f6; }
        .cell.end { background: #ef4444; }
        .cell.wall { background: #64748b; }
        .cell.visited { background: rgba(99, 102, 241, 0.4); }
        .btn { background: #3b82f6; border: none; padding: 10px 20px; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>PathFinder Simulator</h2>
    <div class="grid" id="grid"></div>
    <button class="btn" onclick="runSim()">Find Path</button>
    <script>
        const grid = document.getElementById('grid');
        for (let i = 0; i < 225; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (i === 33) cell.classList.add('start');
            if (i === 188) cell.classList.add('end');
            cell.addEventListener('click', () => {
                if (!cell.classList.contains('start') && !cell.classList.contains('end')) {
                    cell.classList.toggle('wall');
                }
            });
            grid.appendChild(cell);
        }
        
        function runSim() {
            // Animate simple simulated visits
            const cells = document.querySelectorAll('.cell');
            let idx = 34;
            let timer = setInterval(() => {
                if (idx >= 188) {
                    clearInterval(timer);
                } else {
                    if (!cells[idx].classList.contains('end') && !cells[idx].classList.contains('wall')) {
                        cells[idx].classList.add('visited');
                    }
                    idx += 15; // move downwards
                }
            }, 100);
        }
    </script>
</body>
</html>
